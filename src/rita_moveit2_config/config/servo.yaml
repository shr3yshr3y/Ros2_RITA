servo_node:
  ros__parameters:
    # --- 1. KINEMATICS ---
    robot_description_kinematics:
      rita_arm:
        kinematics_solver: kdl_kinematics_plugin/KDLKinematicsPlugin
        kinematics_solver_search_resolution: 0.005
        kinematics_solver_timeout: 0.005

    # --- 2. SERVO CONFIG ---
    moveit_servo:
      use_gazebo: true
      status_topic: "~/status"
      command_in_type: "unitless" 
      command_out_type: "trajectory_msgs/JointTrajectory"
      
      publish_joint_positions: true
      publish_joint_velocities: false
      publish_joint_accelerations: false

      # Timing parameters
      publish_period: 0.02 
      max_expected_latency: 0.1 
      incoming_command_timeout: 0.1 
      
      command_out_topic: "/rita_arm_controller/joint_trajectory"
      
      # Kinematics
      move_group_name: "rita_arm"
      is_primary_planning_scene_monitor: true
      
      # Frame of reference
      check_validity_override: false
      robot_link_command_frame: "camera" 
      
      # Limits
      joint_limit_margin: 0.1
      lower_singularity_threshold: 100000.0 # Bypassed
      hard_stop_singularity_threshold: 100001.0 # Bypassed
      leaving_singularity_threshold_multiplier: 2.0